# mise.toml -- task runner and tool pins for xs
#
# Fork of https://github.com/cablehead/xs (upstream remote: `upstream`).
# This fork lives at https://github.com/joeblew999/xs (origin).
#
# Install: https://mise.jdx.dev
# Usage:   mise install   (installs all tools at pinned versions)
#          mise tasks     (list available tasks)
#          mise run <task>
#
# Rust + wasm targets handled by rust-toolchain.toml -- mise respects it
# automatically. Do NOT add `rust` to [tools] (single source of truth lives in
# rust-toolchain.toml; rustup reads it locally and in CI).
#
# Tools previously installed via `cargo install <foo>` (which land in ~/.cargo/bin)
# should be moved into [tools] below as `"cargo:<foo>" = "<version>"` so mise
# manages them under ~/.local/share/mise/ and ~/.cargo/bin can stay clean.
#
# This repo consumes joeblew999/.github by reference (mise task includes + the
# reusable CI workflow). See https://github.com/joeblew999/.github/blob/main/AGENTS.md

# -- Settings -----------------------------------------------------------------

[settings]
# Run mise tasks serially. `ci` fans out cargo invocations (build + test); on a
# COLD cache (fresh windows runner) parallel cargo processes fight the package-
# cache + build-directory locks and effectively deadlock. One at a time = only
# cargo's own internal parallelism, no cross-invocation contention. Warm runs
# hit rust-cache so this costs ~0.
jobs = 1

# -- Shared task includes (joeblew999/.github) --------------------------------

[task_config]
includes = [
  "git::https://github.com/joeblew999/.github.git//tasks/mise.toml?ref=v0.57.0",
  "git::https://github.com/joeblew999/.github.git//tasks/ci.toml?ref=v0.57.0",
]

# -- Tools --------------------------------------------------------------------

[tools]
# Rust intentionally not listed here -- pinned in rust-toolchain.toml.
# Global tools (gh, fnox, jq, usage, git-cliff, nushell) come from
# `mise run mise:global:bootstrap` -- do NOT pin them here.
node = "22"                          # required for docs site (Astro)
"github:nushell/nushell" = "0.113"   # per-repo pin matching the embedded nu engine (0.113.1)

# -- CI knobs (read by mise:repo:bootstrap, projected into .github/workflows) --
# NOTE: this repo already ships binaries via the hand-written
# .github/workflows/mise-release.yml, so CI_RELEASE is intentionally NOT set --
# `mise run mise:repo:bootstrap` (without --release) writes only mise.yml +
# mise-upgrade.yml and leaves the release workflow untouched.

[env]
CI_OS_MATRIX = '["ubuntu-latest", "macos-latest", "windows-latest"]'   # which OSes CI runs

# -- Build --------------------------------------------------------------------

[tasks.build]
description = "Build the xs binary (debug)"
run = "cargo build"

[tasks."build:release"]
description = "Build the xs binary (release)"
run = "cargo build --release"

# -- Run ----------------------------------------------------------------------

[tasks.run]
description = "Run the xs binary"
run = "cargo run --"

# -- CI -----------------------------------------------------------------------
# Extend the shared `ci` umbrella (ci:check-global + ci:check-nu from the
# included tasks/ci.toml) with this repo's real build+test. mise MERGES the
# local depends with the shared ones, so the guards still run. `test` runs
# `cargo test`, which compiles the binary for THIS OS -- so the matrix builds
# linux + macOS + windows. Native-safe on every runner.

[tasks.ci]
depends = ["test", "test:nu"]

# -- Test ---------------------------------------------------------------------

[tasks.test]
description = "Run all tests"
run = "cargo test"

[tasks."test:nu"]
description = "Run the xs.nu overlay integration test (builds xs, puts it on PATH, runs the nu suite)"
depends = ["build"]
run = '''
#!/usr/bin/env nu
# The overlay test spawns `xs`/`tail` processes that don't terminate cleanly on
# Windows runners (the suite hangs). Skip there; unix/macOS cover the overlay.
if ($nu.os-info.name == "windows") {
  print "test:nu skipped on windows (xs.nu overlay process lifecycle)"
  return
}
# Prepend the freshly-built binary dir so `xs` resolves for the overlay test.
$env.PATH = ($env.PATH | prepend (pwd | path join "target" "debug"))
nu tests/test_xs_nu.nu
'''

# -- Lint and format ----------------------------------------------------------

[tasks.fmt]
description = "Apply rustfmt to the workspace"
run = "cargo fmt --all"

[tasks."fmt:check"]
description = "Check rustfmt without making changes"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Run clippy with warnings as errors"
run = "cargo clippy -- -D warnings"

# -- Check (mirrors scripts/check.sh) -----------------------------------------

[tasks.check]
description = "Full pre-commit check: fmt + clippy + tests + docs build"
depends = ["docs:install"]
run = "bash scripts/check.sh"

# -- Docs site (Astro under docs/) --------------------------------------------

[tasks."docs:install"]
description = "Install docs site dependencies"
dir = "{{config_root}}/docs"
run = "npm install"

[tasks."docs:dev"]
description = "Start the docs site dev server"
depends = ["docs:install"]
dir = "{{config_root}}/docs"
run = "npm run dev"

[tasks."docs:build"]
description = "Build the docs site"
depends = ["docs:install"]
dir = "{{config_root}}/docs"
run = "npm run build"

[tasks."docs:check"]
description = "Run astro check on the docs site"
depends = ["docs:install"]
dir = "{{config_root}}/docs"
run = "npx astro check"

# -- Clean --------------------------------------------------------------------

[tasks.clean]
description = "Clean cargo build artifacts"
run = "cargo clean"
